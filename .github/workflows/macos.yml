name: MacOS CI

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  build-gcc13:
    name: GNU GCC 13
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v1
      with:
        submodules: true
    - name: Build mockturtle
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_CXX_COMPILER=$(which g++-13) -DMOCKTURTLE_BUILD_TESTS=ON ..
        make run_tests
    - name: Run tests
      run: |
        cd build
        ./test/run_tests
  build-clang17:
    name: Clang 17
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v1
      with:
        submodules: true
    - name: Build mockturtle
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_CXX_COMPILER=/usr/bin/clang++ -DMOCKTURTLE_BUILD_TESTS=ON ..
        make run_tests
    - name: Run tests
      run: |
        cd build
        ./test/run_tests
  build-clang18:
    name: Clang 18
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v1
      with:
        submodules: true
    - name: Build mockturtle
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_CXX_COMPILER=$(brew --prefix llvm@18)/bin/clang++ -DMOCKTURTLE_BUILD_TESTS=ON ..
        make run_tests
    - name: Run tests
      run: |
        cd build
        ./test/run_tests
